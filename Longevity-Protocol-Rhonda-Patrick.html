<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Longevity Protocol — Dr. Rhonda Patrick × DOAC</title>
<meta name="description" content="Offline longevity protocol for training, supplements, shopping, recipes, sauna, cold plunge, and lift tracking.">
<meta name="theme-color" content="#f5f4f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#13131a" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Longevity">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
:root{--text:#1a1a2e;--muted:#5a5a7a;--bg:#f5f4f0;--card-bg:#fff;--border:#e0ddd8;--color-background-secondary:#f0eee8}
@media(prefers-color-scheme:dark){:root{--text:#e8e6e1;--muted:#9a98a0;--bg:#13131a;--card-bg:#1c1c28;--border:#2a2a3a;--color-background-secondary:#262636}}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'DM Sans','Aptos','Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input{font:inherit;-webkit-tap-highlight-color:transparent}
button{min-height:44px;touch-action:manipulation}
input{font-size:16px}
.wrap{max-width:800px;margin:0 auto;padding:2rem 1.5rem;padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right));padding-bottom:max(2rem,env(safe-area-inset-bottom))}
.tag{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#E8453C;margin-bottom:6px}
h1{font-size:1.6rem;font-weight:800;line-height:1.2}
.sub{font-size:.82rem;color:var(--muted);margin-top:6px}
.src{font-size:.72rem;color:var(--muted);font-style:italic;margin-top:4px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;position:sticky;top:0;z-index:5;background:var(--bg);padding-top:.25rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;border:none;background:0;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit;transition:all .15s}
.tab.active{font-weight:700;color:var(--text);border-bottom-color:#E8453C}
.card{background:var(--card-bg);border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem}
.card-left{border-left:4px solid var(--accent)}
.grid{display:grid;gap:.75rem}
.day-row{display:grid;grid-template-columns:110px 1fr auto;align-items:center;background:var(--card-bg);border-radius:10px;padding:1rem 1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s}
.day-row.today{box-shadow:0 0 0 2px #E8453C33,0 8px 24px rgba(232,69,60,.08)}
.day-row:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.badge{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block}
.badge-sauna{background:#E8453C22;color:#E8453C}
.badge-cold{background:#2D7DD222;color:#2D7DD2}
.exercise-row{display:grid;grid-template-columns:140px 1fr 70px;align-items:center;padding:.75rem 1rem;background:var(--card-bg);border-radius:8px;font-size:.85rem}
.zone-pill{display:inline-flex;align-items:center;margin-top:7px;padding:5px 9px;border-radius:7px;background:#45B69C14;color:#1D9E75;font-size:.76rem;font-weight:700}
.day-btn{padding:6px 14px;border-radius:20px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;font-size:.8rem;color:var(--muted)}
.supp-card{background:var(--card-bg);border-radius:10px;overflow:hidden;cursor:pointer}
.supp-header{padding:1rem 1.25rem;display:grid;grid-template-columns:1fr auto;align-items:center}
.supp-detail{padding:0 1.25rem 1rem;font-size:.85rem;color:var(--muted);line-height:1.7;border-top:1px solid var(--border);display:none}
.supp-detail.open{display:block}
.arrow{font-size:1.2rem;color:var(--muted);transition:transform .2s}
.arrow.open{transform:rotate(180deg)}
.bonus-btn{margin-top:1.25rem;padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text);width:100%;font-family:inherit}
.bonus-grid{display:none;margin-top:.75rem}.bonus-grid.open{display:grid;gap:.5rem}
.bonus-item{padding:.75rem 1rem;background:var(--card-bg);border-radius:8px;border-left:3px solid #9a98a0}
.hc-btn{padding:10px 20px;border-radius:8px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1.5rem}
.metric{background:var(--card-bg);border-radius:10px;padding:1rem 1.25rem}
.metric-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.metric-val{font-size:.95rem;font-weight:700;color:var(--text)}
.rule{font-size:.82rem;color:var(--muted);line-height:1.6;padding-left:1rem;position:relative;margin-bottom:.5rem}
.rule::before{content:"›";position:absolute;left:0;font-weight:700}
.note-box{padding:1rem 1.25rem;border-radius:10px;font-size:.82rem;color:var(--muted);line-height:1.7;margin-top:1rem}
.disclaimer{margin-top:2rem;padding:1rem 1.25rem;background:var(--card-bg);border-radius:10px;border:1px solid var(--border);font-size:.78rem;color:var(--muted);line-height:1.7}
.hidden{display:none}
.section-title{font-weight:700;font-size:.85rem;margin-bottom:.5rem}
p.intro{color:var(--muted);font-size:.9rem;line-height:1.7;margin-bottom:1.5rem;max-width:700px}
@media(max-width:620px){
.wrap{padding-top:1rem}
.tag{font-size:.66rem}
h1{font-size:1.45rem}
.sub,.src{font-size:.78rem}
.tabs{margin-left:calc(max(1rem,env(safe-area-inset-left)) * -1);margin-right:calc(max(1rem,env(safe-area-inset-right)) * -1);padding-left:max(1rem,env(safe-area-inset-left));padding-right:max(1rem,env(safe-area-inset-right))}
.tab{padding:12px 13px;font-size:.76rem}
.card,.metric,.note-box,.disclaimer{padding:1rem}
.day-row{grid-template-columns:1fr;gap:.45rem;padding:1rem}
.day-row:hover{transform:none}
.day-row>div:last-child{justify-content:flex-start}
.exercise-row{grid-template-columns:1fr;gap:.45rem;align-items:start;padding:1rem}
.exercise-row>span:last-child{text-align:left!important}
.metric-grid{grid-template-columns:1fr}
.supp-header{padding:1rem;gap:.75rem}
.supp-detail{padding:0 1rem 1rem}
.day-btn{flex:1 1 68px;padding:9px 10px}
table{min-width:760px}
}
@media(max-width:380px){
.wrap{padding-left:max(.85rem,env(safe-area-inset-left));padding-right:max(.85rem,env(safe-area-inset-right))}
.tab{padding-left:11px;padding-right:11px}
}
</style>
</head>

const DAYS=[{day:"Monday",label:"Strength + Sauna",color:"#E8453C",type:"Strength Training",dur:"60–75 min",detail:[["Warm-up","10 min light rowing or cycling","10 min"],["⚡ Jump Squats","3 × 5 reps at 40–70% 1RM — EXPLOSIVE (3–5 min rest)","10 min"],["⚡ Explosive Push-ups","3 × 5 reps — max speed off the floor (3 min rest)","8 min"],["🔴 Back Squats","4 × 3–5 reps at 70–85% 1RM — heavy, 3-1-1 cadence (3–5 min rest)","15 min"],["🔴 Deadlifts","3 × 3–5 reps at 70–85% 1RM — heavy, 3-1-1 cadence (3–5 min rest)","12 min"],["🔴 Overhead Press","3 × 3–5 reps at 70–85% 1RM — 3-1-1 cadence (3–5 min rest)","10 min"],["🟢 Farmer's Carries","3 × 40m walks at 60–75% 1RM","6 min"],["Cool-down","5 min stretching + dead hangs for grip","5 min"]],sauna:true,cold:false,notes:"Session order matters: Power first (freshest nervous system) → Strength → Maintenance. ⚡ = Power (40–70% 1RM, max bar speed). 🔴 = Strength (70–85% 1RM, 3-1-1 cadence: 3 sec down, 1 sec pause, 1 sec up). 🟢 = Maintenance (60–75% 1RM, moderate reps). Stop at technical failure — never grind. Post-workout sauna 20–30 min. No cold plunge within 4 hrs."},{day:"Tuesday",label:"Norwegian 4×4 + Cold",color:"#2D7DD2",type:"Norwegian 4×4 HIIT",dur:"40–45 min",detail:[["Warm-up","10 min progressive cycling (indoor bike or rower)","10 min"],["Interval 1","4 min at 85–95% max HR / 3 min recovery at 60–75% HR","7 min"],["Interval 2","4 min at 85–95% max HR / 3 min recovery at 60–75% HR","7 min"],["Interval 3","4 min at 85–95% max HR / 3 min recovery at 60–75% HR","7 min"],["Interval 4","4 min at 85–95% max HR / recovery","4–7 min"],["Cool-down","5 min very easy pedalling","5 min"]],sauna:false,cold:true,notes:"Gold standard for VO2 max (Dr. Levine's 'Prescription for Life'). Use indoor bike or rower. Long intervals (≥2 min) most effective — 4 min intervals maximise time at VO2 max. Cold plunge OK immediately after cardio. Build progressively over 2–3 months."},{day:"Wednesday",label:"Zone 2 Endurance + Sauna",color:"#45B69C",type:"Zone 2 Aerobic",dur:"45–60 min",detail:[["Indoor Cycling","45–60 min at 60–70% max HR (Zone 2: conversational pace)","45–60 min"],["Alternative","Rowing at steady state, or brisk treadmill walk on incline","—"]],sauna:true,cold:false,notes:"Base-building session. Should be able to speak in full sentences but with effort (RPE 9–12). Builds mitochondrial density, fat oxidation, and aerobic efficiency. Post-workout sauna 20–30 min."},{day:"Thursday",label:"Strength + Sauna",color:"#E8453C",type:"Strength Training",dur:"60–75 min",detail:[["Warm-up","10 min light rowing or cycling","10 min"],["⚡ Power Cleans","4 × 3–5 reps at 40–70% 1RM — EXPLOSIVE (3–5 min rest)","12 min"],["⚡ Med Ball Slams","3 × 5 reps — max force into ground (2 min rest)","6 min"],["🔴 Front Squats","4 × 3–5 reps at 70–85% 1RM — 3-1-1 cadence (3–5 min rest)","15 min"],["🔴 Bench Press","3 × 3–5 reps at 70–85% 1RM — 3-1-1 cadence (3–5 min rest)","10 min"],["🔴 Bent-Over Rows","3 × 3–5 reps at 70–85% 1RM — 3-1-1 cadence (3–5 min rest)","10 min"],["🟢 Pull-ups / Lat Pulldown","3 × 8–12 reps at 60–75% 1RM (2 min rest)","6 min"],["🟢 Loaded Lunges","3 × 10 each leg (90 sec rest)","6 min"],["Cool-down","5 min stretching + dead hangs 3 × max hold","5 min"]],sauna:true,cold:false,notes:"Session order: Power first → Strength → Maintenance. ⚡ = Power (40–70% 1RM, max speed/intent). 🔴 = Strength (70–85% 1RM, 3-1-1 cadence). 🟢 = Maintenance (60–75% 1RM, 8–15 reps, 1–2 reps in tank). Leg power directly linked to brain volume preservation. Grip work (dead hangs) — grip strength is a top longevity predictor. Post-workout sauna."},{day:"Friday",label:"Recovery + Cold",color:"#7B68EE",type:"Active Recovery",dur:"30–45 min",detail:[["Light Aerobic","20–30 min easy walk, light cycling, or swimming","20–30 min"],["Mobility / Yoga","15–20 min stretching, foam rolling, joint mobility","15–20 min"]],sauna:false,cold:true,notes:"Mental and physical reset. Rhonda: 'It's this mental cleaning out that I love.' Cold plunge in the const SUPPS=[{name:"Omega-3 Fish Oil (EPA + DHA)",dose:"2–4g EPA/DHA combined",timing:"Split AM/PM with meals",p:1,notes:"Rhonda's personal practice: 2g EPA (morning) + 2g DHA (evening) = 4g total in triglyceride form. She takes Metagenics EPA-DHA 2400. Conservative dose: 2g/day to reach Omega-3 Index 8%+. Loading: 5g/day for 4 weeks (Dr. McGlory), then maintenance. Quality: TOTOX < 10, triglyceride form, IFOS/NSF certified, >80% concentration. Refrigerate. Other brands: OmegaVia, Pure Encapsulations One Omega. Test via OmegaQuant every 4 months. Note: doses >1.8g/day may carry slight Afib risk in older adults with CV risk factors — discuss with GP.",color:"#2D7DD2"},{name:"Vitamin D3",dose:"4,000–5,000 IU",timing:"Morning, with fat-containing meal",p:2,notes:"Target blood: 40–60 ng/mL. D3 only — D2 less effective and can reduce D3 levels. Rhonda takes Thorne D-5,000 (4,000 IU from multivitamin + additional). Regulates 5%+ of human genome. Deficiency = up to 80% higher dementia risk. D3 supplementation in deficient individuals slowed biological aging by ~2 years. Take with K2 and fat.",color:"#F4A261"},{name:"Multivitamin (without iron)",dose:"1 daily",timing:"Morning, with food",p:3,notes:"COSMOS trials (13,000+ participants): reversed episodic brain aging ~3–5 yrs, slowed epigenetic aging. No iron for men — excess iron = oxidative stress + DNA damage. Rhonda personally takes Pure Encapsulations O.N.E. Multivitamin (bioavailable forms, clean formulation). The COSMOS study used Centrum Silver. Note: Pure Encapsulations O.N.E. does not contain magnesium — that's why she supplements it separately. Also compensates for mineral loss from RO water filtration.",color:"#45B69C"},{name:"Magnesium",dose:"400mg elemental",timing:"Evening (aids sleep)",p:4,notes:"~50% deficient. Required for 300+ enzymes, DNA repair. Athletes need 10–20% more (sweat losses). Required cofactor for D3 activation. Highest levels = 40% lower all-cause mortality. Each 100mg decrease = 24% more pancreatic cancer. Reduces sleep onset ~15–20 min. Threonate (brain), Glycinate (sleep). 350–400mg/day.",color:"#7B68EE"},{name:"Creatine Monohydrate",dose:"10g daily",timing:"Any time, with water or shake",p:5,notes:"Brain needs higher doses — 5g saturates muscle, 10g+ for brain uptake. Rhonda takes 10g/day. Higher bodyweight dosing may support bone health alongside resistance training. Negates sleep deprivation cognitive deficits. Improved CBT outcomes for depression. 14% lower cancer risk per 0.09g additional dietary creatine. No loading needed — saturates ~28 days. Combine with carbs (50–100g). NSF Certified for Sport. 40+ years safety data.",color:"#E8453C"},{name:"Vitamin K2 (MK-7)",dose:"100–200mcg",timing:"With Vitamin D3",p:6,notes:"Essential D3 companion — directs calcium to bones, away from arteries. Rhonda uses Thorne K2/D3 Drops (combines both). Critical for blood coagulation. Supports bone density alongside creatine and resistance training.",color:"#D4A373"}];

function liftForExercise(title){
const t=title.toLowerCase();
if(t.includes("back squat"))return LIFTS.find(l=>l.id==="back_squat");
if(t.includes("front squat"))return LIFTS.find(l=>l.id==="front_squat");
if(t.includes("deadlift"))return LIFTS.find(l=>l.id==="deadlift");
if(t.includes("bench press"))return LIFTS.find(l=>l.id==="bench_press");
if(t.includes("overhead press"))return LIFTS.find(l=>l.id==="overhead_press");
if(t.includes("bent-over row"))return LIFTS.find(l=>l.id==="bent_over_row");
if(t.includes("power clean"))return LIFTS.find(l=>l.id==="power_clean");
if(t.includes("pull-up")||t.includes("lat pulldown"))return LIFTS.find(l=>l.id==="pull_up");
return null
}
function zoneLabel(zone){return zone==="power"?"Power":zone==="strength"?"Strength":"Maintenance"}
function zoneColor(zone){return zone==="power"?"#E24B4A":zone==="strength"?"#BA7517":"#1D9E75"}

function saveHistory(hist){try{localStorage.setItem("lp_history",JSON.stringify(hist))}catch(e){}}
function calcZones(rm){return{power:[Math.round(rm*0.4),Math.round(rm*0.7)],strength:[Math.round(rm*0.7),Math.round(rm*0.85)],maintenance:[Math.round(rm*0.6),Math.round(rm*0.75)]}}

}},h("span",{id:"copy-status"},"Copy to clipboard")));

const txt=getNeededText();
window.open("mailto:?subject=Shopping List — Longevity Protocol&body="+encodeURIComponent(txt))
}},"Email to self"));
frag.append(shareWrap);
frag.append(h("div",{style:{fontSize:".72rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:"1.6"}},"Tip: 'Copy to clipboard' is the fastest — paste into WhatsApp, iMessage, or Notes on your phone. 'Email to self' opens your default mail client with the list pre-filled."));
}
// Categories
SHOPPING_CATS.forEach(cat=>{
const catItems=state.shopFilter==="need"?cat.items.filter((_,ii)=>!state.checked[cat.cat+"-"+ii]):cat.items;
if(state.shopFilter==="need"&&catItems.length===0)return;
const section=h("div",{style:{marginBottom:"1rem"}});
section.append(h("div",{style:{fontWeight:700,fontSize:".85rem",color:"var(--text)",marginBottom:".5rem",paddingLeft:".25rem"}},cat.cat));
const grid=h("div",{style:{display:"grid",gap:"4px"}});
cat.items.forEach((item,ii)=>{
const key=cat.cat+"-"+ii;
const checked=!!state.checked[key];
if(state.shopFilter==="need"&&checked)return;
const row=h("div",{style:{display:"grid",gridTemplateColumns:"32px 1fr",alignItems:"center",padding:".6rem .75rem",background:"var(--card-bg)",borderRadius:"8px",cursor:"pointer",opacity:checked?".45":"1",transition:"opacity .2s"},onClick:()=>{state.checked[key]=!state.checked[key];saveChecked();render()}},
h("div",{style:{width:"20px",height:"20px",borderRadius:"5px",border:checked?"none":"2px solid var(--border)",background:checked?"#45B69C":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s",fontSize:"12px",color:"#fff",fontWeight:700}},checked?"✓":""),
h("span",{style:{fontSize:".85rem",color:checked?"var(--muted)":"var(--text)",textDecoration:checked?"line-through":"none"}},item));
grid.append(row);
});
section.append(grid);
frag.append(section);
});
return frag;
}
function renderLifts(){
const frag=document.createDocumentFragment();
const lifts=loadLifts();
const history=loadHistory();
// View toggle
const toggleWrap=h("div",{style:{display:"flex",gap:"8px",marginBottom:"1.25rem"}});
[["current","Current 1RM","#E8453C"],["progress","Progress","#2D7DD2"]].forEach(([k,l,c])=>{
toggleWrap.append(h("button",{style:{padding:"10px 20px",borderRadius:"8px",border:"none",fontSize:".85rem",fontWeight:700,cursor:"pointer",background:state.liftView===k?c:"var(--card-bg)",color:state.liftView===k?"#fff":"var(--muted)",fontFamily:"inherit",transition:"all .15s"},onClick:()=>{state.liftView=k;render()}},l))});
frag.append(toggleWrap);
if(state.liftView==="current"){
frag.append(h("p",{class:"intro"},"Enter your estimated 1RM for each lift (use your 5-rep max × 1.15). Training zones auto-calculate. Hit Save to log today's numbers for progress tracking."));
const grid=h("div",{style:{display:"grid",gap:"12px"}});
LIFTS.forEach(lift=>{
const val=lifts[lift.id]||"";
const card=h("div",{style:{background:"var(--card-bg)",borderRadius:"10px",padding:"1rem 1.25rem",borderLeft:"3px solid "+(lift.zone==="power"?"#E24B4A":lift.zone==="strength"?"#BA7517":"#1D9E75")}});
const header=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
header.append(h("div",null,h("span",{style:{fontSize:"1rem",fontWeight:700}},lift.icon+" "+lift.name),h("span",{style:{fontSize:".78rem",color:"var(--muted)",marginLeft:"8px"}},lift.day)));
const input=h("input",{type:"number",id:"lift_"+lift.id,value:val,placeholder:"kg",style:{width:"80px",padding:"6px 10px",borderRadius:"6px",border:"1px solid var(--border)",fontSize:".9rem",fontFamily:"inherit",background:"var(--card-bg)",color:"var(--text)",textAlign:"right"}});
input.addEventListener("input",function(){
const v=parseFloat(this.value);
const zoneEl=document.getElementById("zones_"+lift.id);
if(v&&v>0){const z=calcZones(v);zoneEl.innerHTML="";
zoneEl.style.display="grid";
[["⚡ Power",z.power,"#E24B4A"],["🔴 Strength",z.strength,"#BA7517"],["🟢 Maintenance",z.maintenance,"#1D9E75"]].forEach(([label,range,col])=>{
const pill=document.createElement("div");pill.style.cssText="font-size:.78rem;padding:4px 10px;border-radius:6px;background:var(--color-background-secondary)";
pill.innerHTML="<span style='color:"+col+";font-weight:600'>"+label+"</span> <span style='color:var(--muted)'>"+range[0]+"–"+range[1]+"kg</span>";
zoneEl.appendChild(pill)})}else{zoneEl.innerHTML="<span style='font-size:.78rem;color:var(--muted)'>Enter 1RM to see zones</span>";zoneEl.style.display="block"}});
header.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},input,h("span",{style:{fontSize:".82rem",color:"var(--muted)"}},"kg")));
card.append(header);
const zones=h("div",{id:"zones_"+lift.id,style:{display:val?"grid":"block",gridTemplateColumns:"repeat(3,1fr)",gap:"6px"}});
if(val){const z=calcZones(parseFloat(val));
[["⚡ Power",z.power,"#E24B4A"],["🔴 Strength",z.strength,"#BA7517"],["🟢 Maintenance",z.maintenance,"#1D9E75"]].forEach(([label,range,col])=>{
const pill=h("div",{style:{fontSize:".78rem",padding:"4px 10px",borderRadius:"6px",background:"var(--color-background-secondary)"}});
pill.innerHTML="<span style='color:"+col+";font-weight:600'>"+label+"</span> <span style='color:var(--muted)'>"+range[0]+"–"+range[1]+"kg</span>";
zones.append(pill)})}else{zones.append(h("span",{style:{fontSize:".78rem",color:"var(--muted)"}},"Enter 1RM to see zones"))}
card.append(zones);grid.append(card)});
frag.append(grid);
// Save button
const saveBtn=h("button",{style:{marginTop:"1.25rem",padding:"12px 20px",borderRadius:"8px",border:"none",background:"#45B69C",color:"#fff",fontSize:".9rem",fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"inherit"},onClick:()=>{
const newLifts={};let hasData=false;
LIFTS.forEach(l=>{const el=document.getElementById("lift_"+l.id);if(el&&el.value){newLifts[l.id]=parseFloat(el.value);hasData=true}});
if(!hasData){alert("Enter at least one 1RM value first.");return}
saveLifts(newLifts);
const hist=loadHistory();
hist.push({date:new Date().toISOString().slice(0,10),lifts:{...newLifts}});
saveHistory(hist);
const btn=document.getElementById("save-status");
btn.textContent="Saved ✓";btn.style.background="#1D9E75";
setTimeout(()=>{btn.textContent="Save current 1RM values";btn.style.background="#45B69C"},2000)
}},"Save current 1RM values");
saveBtn.id="save-status";
frag.append(saveBtn);
frag.append(h("div",{style:{marginTop:".75rem",fontSize:".78rem",color:"var(--muted)",textAlign:"center"}},"Values saved to your browser's local storage — they persist between sessions on this device."));
}else{
// Progress view
if(history.length===0){
frag.append(h("div",{style:{padding:"2rem",textAlign:"center",color:"var(--muted)",fontSize:".9rem"}},"No progress data yet. Go to 'Current 1RM', enter your numbers, and hit Save. Each time you save, a snapshot is logged here."));
}else{
frag.append(h("p",{class:"intro"},"Each save creates a snapshot. Track your progression over time."));
// Summary cards for latest vs first
const latest=history[history.length-1];
const first=history[0];
if(history.length>=2){
const summWrap=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"8px",marginBottom:"1.25rem"}});
LIFTS.forEach(l=>{
const firstVal=first.lifts[l.id];const latestVal=latest.lifts[l.id];
if(!firstVal||!latestVal)return;
const diff=latestVal-firstVal;const pct=Math.round((diff/firstVal)*100);
const col=diff>0?"#1D9E75":diff<0?"#E24B4A":"var(--muted)";
summWrap.append(h("div",{style:{background:"var(--card-bg)",borderRadius:"8px",padding:"10px 12px"}},
h("div",{style:{fontSize:".72rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:"2px"}},l.name),
h("div",{style:{fontSize:"1.1rem",fontWeight:700}},latestVal+"kg"),
h("div",{style:{fontSize:".78rem",color:col,fontWeight:600}},(diff>0?"+":"")+diff+"kg ("+(diff>0?"+":"")+pct+"%)")))});
frag.append(summWrap);
frag.append(h("div",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:"1rem"}},"Comparing: "+first.date+" → "+latest.date+" ("+history.length+" entries)"));
}
// History table
const table=h("div",{style:{overflowX:"auto"}});
const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".78rem"}});
const thead=h("tr",null,h("td",{style:{padding:"8px 6px",fontWeight:700,color:"var(--text)",borderBottom:"1px solid var(--border)"}},"Date"));
LIFTS.forEach(l=>{thead.append(h("td",{style:{padding:"8px 6px",fontWeight:700,color:"var(--text)",borderBottom:"1px solid var(--border)",textAlign:"right",whiteSpace:"nowrap"}},l.name))});
tbl.append(thead);
history.slice().reverse().forEach((entry,ei)=>{
const row=h("tr");
row.append(h("td",{style:{padding:"6px",color:"var(--muted)",borderBottom:"0.5px solid var(--border)"}},entry.date));
LIFTS.forEach(l=>{
const v=entry.lifts[l.id];
const prev=ei<history.length-1?history[history.length-2-ei]:null;
const prevV=prev?prev.lifts[l.id]:null;
let arrow="";if(prevV&&v){if(v>prevV)arrow=" ↑";else if(v<prevV)arrow=" ↓"}
row.append(h("td",{style:{padding:"6px",textAlign:"right",borderBottom:"0.5px solid var(--border)",color:v?"var(--text)":"var(--muted)"}},v?v+"kg"+arrow:"—"))});
tbl.append(row)});
table.append(tbl);frag.append(table);
// Clear button
frag.append(h("button",{style:{marginTop:"1rem",padding:"8px 16px",borderRadius:"6px",border:"1px solid var(--border)",background:"var(--card-bg)",fontSize:".78rem",cursor:"pointer",color:"var(--muted)",fontFamily:"inherit"},onClick:()=>{if(confirm("Clear all progress history? This cannot be undone.")){saveHistory([]);render()}}},"Clear history"));
}
}
return frag;
}
if("serviceWorker" in navigator&&(location.protocol==="https:"||location.hostname==="localhost"||location.hostname==="127.0.0.1")){
window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})});
}
render();
</script>
</body>
</html>
